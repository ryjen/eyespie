name: Configure build
description: Configure build from environment configuration
inputs:
  android_keystore:
    description: "Base64 encoded keystore file"
    required: true
    type: string
  login_email:
    description: The default user to populate login with
    required: false
    type: string
  login_password:
    description: The default password to populate login with
    required: false
    type: string
  config:
    description: "Optional base64 encoded environment config"
    required: false
    type: string
outputs:
  android_keystore:
    description: "The decoded keystore as a file"
    value: ${{ steps.decode.outputs.android_keystore }}
  env_file:
    description: "The local environment file"
    value: ${{ steps.env.outputs.env_file }}
runs:
  using: "composite"
  steps:
    - uses: ruby/setup-ruby@95ef2b042f9d7a56d8268cba8559e2842e2ad01b # v1
      with:
        ruby-version: "3.2"
        bundler-cache: true

    - name: Set up JDK 21
      uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
      with:
        distribution: "temurin"
        java-version: "21"

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6

    - name: Create android keystore
      if: inputs.android_keystore != ''
      id: decode
      env:
        ANDROID_KEYSTORE_B64: ${{ inputs.android_keystore }}
      run: |
        printf '%s' "$ANDROID_KEYSTORE_B64" | base64 -d > "${{ github.workspace }}/android.keystore"
        echo "android_keystore=${{ github.workspace }}/android.keystore" >> "$GITHUB_OUTPUT"
      shell: bash

    - name: Create build config
      env:
        LOGIN_EMAIL_VALUE: ${{ inputs.login_email }}
        LOGIN_PASSWORD_VALUE: ${{ inputs.login_password }}
      run: |
        printf 'LOGIN_EMAIL=%s\n' "$LOGIN_EMAIL_VALUE" > "${{ github.workspace }}/.env.local"
        printf 'LOGIN_PASSWORD=%s\n' "$LOGIN_PASSWORD_VALUE" >> "${{ github.workspace }}/.env.local"
      shell: bash

    - name: Append application config
      if: inputs.config != ''
      env:
        INPUT_CONFIG: ${{ inputs.config }}
      run: |
        printf '\n' >> "${{ github.workspace }}/.env.local"
        echo "APP_CONFIG bytes: ${#INPUT_CONFIG}"
        printf '%s' "$INPUT_CONFIG" | base64 -d >> "${{ github.workspace }}/.env.local"
      shell: bash

    - name: Export environment file path
      id: env
      run: echo "env_file=${{ github.workspace }}/.env.local" >> "$GITHUB_OUTPUT"
      shell: bash
