name: Workflow Security

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - ".github/dependabot.yml"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - ".github/dependabot.yml"
  workflow_dispatch:

env:
  ZIZMOR_VERSION: "1.28.0"

permissions:
  contents: read

concurrency:
  group: eyespie-workflow-security-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  zizmor:
    name: zizmor
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0

      # Slice A intentionally blocks on high-confidence, high-severity findings
      # in workflow files. Composite-action internals require a separate hardening slice.
      - name: Audit GitHub workflow definitions
        run: >-
          uvx "zizmor@${ZIZMOR_VERSION}"
          --format=github
          --min-confidence=high
          --min-severity=high
          --collect=workflows
          .
        env:
          GH_TOKEN: ${{ github.token }}
