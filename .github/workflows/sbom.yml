name: SBOM

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: eyespie-sbom-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  SBOM_COMPONENT_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || github.sha }}

jobs:
  generate:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Create build configuration
        run: cp env.example .env.local

      - name: Generate Gradle and Kotlin Multiplatform SBOM
        shell: bash
        run: |
          set -o pipefail
          if ! ./gradlew \
            :app:cyclonedxDirectBom \
            --no-daemon \
            --parallel \
            --build-cache \
            --configuration-cache \
            >gradle-sbom.log 2>&1; then
            tail -n 120 gradle-sbom.log
            exit 1
          fi
          tail -n 40 gradle-sbom.log

      - name: Upload Gradle failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: eyespie-sbom-gradle-failure-${{ github.sha }}
          path: gradle-sbom.log
          if-no-files-found: error
          retention-days: 7

      - name: Install CycloneDX CocoaPods generator
        run: |
          gem install --user-install cyclonedx-cocoapods --version 2.0.1 --no-document
          echo "$(ruby -e 'puts Gem.user_dir')/bin" >> "$GITHUB_PATH"

      - name: Generate CocoaPods SBOM
        run: |
          cyclonedx-cocoapods \
            --path iosApp \
            --output build/reports/sbom/eyespie-cocoapods.cdx.json \
            --name eyespie \
            --version "$SBOM_COMPONENT_VERSION" \
            --type application \
            --group com.micrantha \
            --source https://github.com/ryjen/eyespie \
            --exclude-test-targets

      - name: Check generated SBOMs
        run: |
          ruby <<'RUBY'
          require "json"

          paths = Dir["build/reports/sbom/*.cdx.json"].sort
          abort "expected two SBOM documents, found #{paths.length}" unless paths.length == 2

          paths.each do |path|
            bom = JSON.parse(File.read(path))
            abort "#{path}: not a CycloneDX BOM" unless bom["bomFormat"] == "CycloneDX"
            abort "#{path}: missing components" unless bom["components"].is_a?(Array)
            puts "#{path}: #{bom["components"].length} components"
          end
          RUBY

      - name: Upload SBOM bundle
        uses: actions/upload-artifact@v4
        with:
          name: eyespie-sbom-${{ github.sha }}
          path: build/reports/sbom/*.cdx.json
          if-no-files-found: error
          retention-days: 30
