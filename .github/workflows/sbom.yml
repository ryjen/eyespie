name: SBOM

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: eyespie-sbom-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false

      - name: Set SBOM component version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
            if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
              echo "tag does not contain a valid semantic version: $GITHUB_REF_NAME" >&2
              exit 1
            fi
            cocoapods_version="${version%%+*}"
          else
            version="0.1.0+git.${GITHUB_SHA:0:12}"
            cocoapods_version="0.1.0"
          fi
          echo "SBOM_COMPONENT_VERSION=$version" >> "$GITHUB_ENV"
          echo "COCOAPODS_COMPONENT_VERSION=$cocoapods_version" >> "$GITHUB_ENV"

      - name: Set up JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          java-version: "21"
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Create build configuration
        run: cp env.example .env.local

      - name: Generate Gradle and Kotlin Multiplatform SBOM
        shell: bash
        run: |
          set -o pipefail
          if ! ./gradlew \
            :app:cyclonedxDirectBom \
            --no-daemon \
            --parallel \
            --build-cache \
            --configuration-cache \
            >gradle-sbom.log 2>&1; then
            tail -n 120 gradle-sbom.log
            exit 1
          fi
          tail -n 40 gradle-sbom.log

      - name: Add verified model pack components
        shell: bash
        run: |
          ruby <<'RUBY'
          require "digest"
          require "json"

          bom_path = "build/reports/sbom/eyespie-gradle.cdx.json"
          manifest_path = "model-pack/src/main/assets/model/manifest.json"
          manifest = JSON.parse(File.read(manifest_path))
          artifact_path = File.join(File.dirname(manifest_path), manifest.fetch("filename"))

          unless File.file?(artifact_path)
            File.open(ENV.fetch("GITHUB_ENV"), "a") { |file| file.puts "MODEL_ARTIFACT_INCLUDED=false" }
            puts "Model artifact is not staged; omitting model-pack components from the source SBOM."
            exit
          end

          actual_size = File.size(artifact_path)
          expected_size = manifest.fetch("sizeBytes")
          abort "model size mismatch: expected #{expected_size}, got #{actual_size}" unless actual_size == expected_size

          actual_sha256 = Digest::SHA256.file(artifact_path).hexdigest
          expected_sha256 = manifest.fetch("sha256").downcase
          abort "model digest mismatch" unless actual_sha256 == expected_sha256
          File.open(ENV.fetch("GITHUB_ENV"), "a") { |file| file.puts "MODEL_ARTIFACT_INCLUDED=true" }

          bom = JSON.parse(File.read(bom_path))
          components = bom["components"] ||= []
          dependencies = bom["dependencies"] ||= []
          component_version = ENV.fetch("SBOM_COMPONENT_VERSION")
          pack_ref = "urn:eyespie:model-pack:model_pack:#{component_version}"
          model_ref = "urn:eyespie:model:#{manifest.fetch("modelId")}:#{manifest.fetch("version")}"

          components.reject! { |component| [pack_ref, model_ref].include?(component["bom-ref"]) }
          components << {
            "type" => "data",
            "bom-ref" => pack_ref,
            "group" => "com.micrantha",
            "name" => "model_pack",
            "version" => component_version,
            "properties" => [
              { "name" => "eyespie:asset-pack:delivery", "value" => "on-demand" },
              { "name" => "eyespie:asset-pack:module", "value" => ":model-pack" }
            ]
          }
          components << {
            "type" => "machine-learning-model",
            "bom-ref" => model_ref,
            "group" => "com.micrantha",
            "name" => manifest.fetch("modelId"),
            "version" => manifest.fetch("version"),
            "hashes" => [{ "alg" => "SHA-256", "content" => actual_sha256 }],
            "properties" => [
              { "name" => "eyespie:model:filename", "value" => manifest.fetch("filename") },
              { "name" => "eyespie:model:size-bytes", "value" => actual_size.to_s },
              { "name" => "eyespie:model:runtime-engine", "value" => manifest.dig("runtime", "engine").to_s },
              { "name" => "eyespie:model:minimum-runtime-version", "value" => manifest.dig("runtime", "minimumRuntimeVersion").to_s },
              { "name" => "eyespie:model:minimum-abi", "value" => manifest.dig("runtime", "minimumModelAbi").to_s }
            ]
          }

          add_dependency = lambda do |ref, depends_on|
            entry = dependencies.find { |dependency| dependency["ref"] == ref }
            if entry
              entry["dependsOn"] = (Array(entry["dependsOn"]) + depends_on).uniq
            else
              dependencies << { "ref" => ref, "dependsOn" => depends_on }
            end
          end

          root_ref = bom.dig("metadata", "component", "bom-ref")
          add_dependency.call(root_ref, [pack_ref]) if root_ref
          add_dependency.call(pack_ref, [model_ref])
          File.write(bom_path, JSON.pretty_generate(bom) + "\n")
          RUBY

      - name: Upload Gradle failure log
        if: failure() && hashFiles('gradle-sbom.log') != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: eyespie-sbom-gradle-failure-${{ github.sha }}
          path: gradle-sbom.log
          if-no-files-found: error
          retention-days: 7

      - name: Install CycloneDX CocoaPods generator
        run: |
          gem install --user-install cyclonedx-cocoapods --version 2.0.1 --no-document
          echo "$(ruby -e 'puts Gem.user_dir')/bin" >> "$GITHUB_PATH"

      - name: Prepare locked CocoaPods dependency graph
        shell: bash
        run: |
          set -o pipefail
          if ! {
            ./gradlew \
              :app:podspec \
              :app:generateDummyFramework \
              --no-daemon \
              --build-cache
            pod install --deployment --project-directory=iosApp
          } >cocoapods-prepare.log 2>&1; then
            tail -n 120 cocoapods-prepare.log
            exit 1
          fi
          tail -n 40 cocoapods-prepare.log

      - name: Upload CocoaPods preparation failure log
        if: failure() && hashFiles('cocoapods-prepare.log') != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: eyespie-sbom-cocoapods-prepare-failure-${{ github.sha }}
          path: cocoapods-prepare.log
          if-no-files-found: error
          retention-days: 7

      - name: Generate CocoaPods SBOM
        shell: bash
        run: |
          set -o pipefail
          mkdir -p build/reports/sbom
          if ! cyclonedx-cocoapods \
            --path iosApp \
            --output build/reports/sbom/eyespie-cocoapods.cdx.json \
            --name eyespie \
            --version "$COCOAPODS_COMPONENT_VERSION" \
            --type application \
            --group com.micrantha \
            --source https://github.com/ryjen/eyespie \
            --exclude-test-targets \
            >cocoapods-sbom.log 2>&1; then
            cat cocoapods-sbom.log
            exit 1
          fi
          cat cocoapods-sbom.log

      - name: Upload CocoaPods SBOM failure log
        if: failure() && hashFiles('cocoapods-sbom.log') != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: eyespie-sbom-cocoapods-failure-${{ github.sha }}
          path: cocoapods-sbom.log
          if-no-files-found: error
          retention-days: 7

      - name: Check generated SBOMs
        run: |
          ruby <<'RUBY'
          require "json"

          paths = Dir["build/reports/sbom/*.cdx.json"].sort
          abort "expected two SBOM documents, found #{paths.length}" unless paths.length == 2

          paths.each do |path|
            bom = JSON.parse(File.read(path))
            abort "#{path}: not a CycloneDX BOM" unless bom["bomFormat"] == "CycloneDX"
            abort "#{path}: missing components" unless bom["components"].is_a?(Array)
            puts "#{path}: #{bom["components"].length} components"
          end

          gradle_bom = JSON.parse(File.read("build/reports/sbom/eyespie-gradle.cdx.json"))
          components = gradle_bom.fetch("components")
          abort "debug-only dependency leaked into SBOM" if components.any? { |component| component["name"] == "okio-fakefilesystem" }
          if ENV.fetch("MODEL_ARTIFACT_INCLUDED", "false") == "true"
            abort "model asset pack missing from SBOM" unless components.any? { |component| component["name"] == "model_pack" }
            abort "ML model missing from SBOM" unless components.any? { |component| component["type"] == "machine-learning-model" }
          end
          RUBY

      - name: Verify generated CocoaPods metadata is committed
        run: git diff --exit-code -- eyespie/eyespie.podspec iosApp/Podfile.lock

      - name: Upload CocoaPods metadata drift
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: eyespie-sbom-cocoapods-metadata-${{ github.sha }}
          path: |
            eyespie/eyespie.podspec
            iosApp/Podfile.lock
          if-no-files-found: error
          retention-days: 7

      - name: Upload SBOM bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: eyespie-sbom-${{ github.sha }}
          path: build/reports/sbom/*.cdx.json
          if-no-files-found: error
          retention-days: 30
