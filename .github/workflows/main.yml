name: EyesPie CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: eyespie-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: gradle

      - name: Create build configuration
        run: cp env.example .env.local

      - name: Test and build debug app bundle with asset packs
        run: ./gradlew test :app:bundleDebug --no-daemon --parallel --build-cache

      - name: Upload debug app bundle
        uses: actions/upload-artifact@v4
        with:
          name: eyespie-debug-aab
          path: eyespie/build/outputs/bundle/debug/*.aab
          if-no-files-found: error
          retention-days: 7
