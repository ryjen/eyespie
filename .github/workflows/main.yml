name: EyesPie CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: gradle

      - name: Create build configuration
        run: cp env.example .env.local

      - name: Validate Gradle configuration
        run: ./gradlew :app:tasks --no-daemon

      - name: Run tests
        run: ./gradlew test --no-daemon

      - name: Build debug app bundle with asset packs
        run: ./gradlew :app:bundleDebug --no-daemon

      - name: Upload debug app bundle
        uses: actions/upload-artifact@v4
        with:
          name: eyespie-debug-aab
          path: eyespie/build/outputs/bundle/debug/*.aab
          if-no-files-found: error
          retention-days: 7
